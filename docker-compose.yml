services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discordvip}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "0.0.0.0:5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    cpus: 1
    mem_limit: 256m

  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-discordvip}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_DIR: /backups
    depends_on:
      - postgres
    volumes:
      - ./scripts/db-backup:/scripts:ro
      - ./backups:/backups
    command: ["/bin/sh", "/scripts/entrypoint.sh"]
    cpus: 0.25
    mem_limit: 128m

  app-server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      CINEMA_PUBLIC_BASE_URL_FILE: /runtime/cinema_public_base_url.txt
      CINEMA_PUBLIC_BASE_URL_LOG_FILE: /runtime/cloudflared.log
    depends_on:
      - postgres
    volumes:
      - ./storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - E:\:/mnt/e:ro
      - ./runtime:/runtime
    expose:
      - "3000"
    cpus: 1.0
    mem_limit: 1024m

  telethon-stream:
    build:
      context: .
      dockerfile: scripts/Dockerfile.telethon-stream
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      TELETHON_SESSION_PATH: /data/user_session
      TELETHON_STREAM_PORT: 8090
    working_dir: /app/scripts
    volumes:
      - ./:/app
      - ./user_session.session:/data/user_session.session
    expose:
      - "8090"
    cpus: 0.75
    mem_limit: 256m

  telethon-bot-manager:
    build:
      context: .
      dockerfile: scripts/Dockerfile.telegram-bot-manager
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      TELETHON_SESSION_PATH: /data/bot_manager_session
      VITE_API_BASE_URL: http://app-server:3000
    working_dir: /app/scripts
    volumes:
      - ./:/app
      - ./storage/telethon:/data
    depends_on:
      - app-server
    cpus: 0.5
    mem_limit: 128m

  admin-web:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_ENABLE_DEBUG_LOGIN: ${VITE_ENABLE_DEBUG_LOGIN:-false}
    restart: unless-stopped
    depends_on:
      - app-server
    ports:
      - "0.0.0.0:${ADMIN_WEB_PORT:-13002}:4173"
    expose:
      - "4173"
    cpus: 0.25
    mem_limit: 128m

  n8n:
    image: n8nio/n8n:1.89.2
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me}
      GENERIC_TIMEZONE: ${TIMEZONE:-Asia/Ho_Chi_Minh}
      TZ: ${TIMEZONE:-Asia/Ho_Chi_Minh}
    ports:
      - "0.0.0.0:${N8N_PORT:-5679}:5678"
    volumes:
      - ./n8n/data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    depends_on:
      - app-server
    cpus: 0.5
    mem_limit: 384m

  web-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app-server
      - admin-web
      - telethon-stream
    ports:
      - "0.0.0.0:${WEB_GATEWAY_PORT:-8081}:8080"
    volumes:
      - ./nginx/demo.conf:/etc/nginx/conf.d/default.conf:ro
    cpus: 0.25
    mem_limit: 128m

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - C:/Users/eddyvn/.cloudflared/214e0dc2-0c10-427a-9060-74fe09b52486.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - web-gateway
    cpus: 0.25
    mem_limit: 128m

  cloudflared-hatangmang:
    build:
      context: .
      dockerfile: cloudflared/Dockerfile.quick
    restart: unless-stopped
    profiles: ["tunnel"]
    command: ["/bin/sh", "/scripts/cloudflared-auto-tunnel.sh"]
    volumes:
      - ./scripts/cloudflared-auto-tunnel.sh:/scripts/cloudflared-auto-tunnel.sh:ro
      - ./runtime:/runtime
    depends_on:
      - web-gateway
    cpus: 0.25
    mem_limit: 128m

volumes:
  postgres-data:
