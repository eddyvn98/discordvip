services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: discordvip
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-discordvip}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_DIR: /backups
    depends_on:
      - postgres
    volumes:
      - ./scripts/db-backup:/scripts:ro
      - ./backups:/backups
    command: ["/bin/sh", "/scripts/entrypoint.sh"]

  app-server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    depends_on:
      - postgres
    expose:
      - "3000"

  admin-web:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - app-server
    ports:
      - "13001:4173"
    expose:
      - "4173"

  web-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app-server
      - admin-web
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/demo.conf:/etc/nginx/conf.d/default.conf:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - C:/Users/eddyvn/.cloudflared/214e0dc2-0c10-427a-9060-74fe09b52486.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - web-gateway

volumes:
  postgres-data:
