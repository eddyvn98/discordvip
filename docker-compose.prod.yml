services:
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discordvip}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}
    volumes:
      - ${POSTGRES_DATA_PATH:-/opt/discordvip/postgres-data}:/var/lib/postgresql/data

  db-backup:
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-discordvip}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_DIR: /backups
    volumes:
      - ./scripts/db-backup:/scripts:ro
      - ${BACKUPS_PATH:-/opt/discordvip/backups}:/backups

  app-server:
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      APP_ENV: production
      TRUST_PROXY: true
      RUN_DB_PUSH_ON_START: false
      RUN_DB_SEED_ON_START: false

  admin-web:
    build:
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_ENABLE_DEBUG_LOGIN: false
    ports: []

  web-gateway:
    ports:
      - "${WEB_HTTP_PORT:-80}:8080"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro

  cloudflared:
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_CREDENTIALS_PATH:-/etc/cloudflared/credentials.json}:/etc/cloudflared/credentials.json:ro

volumes: {}
